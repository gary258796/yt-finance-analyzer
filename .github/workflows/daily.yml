name: Daily Pipeline

on:
  schedule:
    # UTC 03:30 = 台灣 11:30，週一至週六
    - cron: '30 3 * * 1-6'
  workflow_dispatch:
    inputs:
      date:
        description: '目標日期 (YYYY-MM-DD)，留空則為今天'
        required: false

jobs:
  daily-run:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      CHANNELS_CONFIG: ${{ secrets.CHANNELS_CONFIG }}
      YOUTUBE_COOKIES_FILE: ./cookies.txt
      TZ: Asia/Taipei

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore cookies.txt
        run: echo "$YOUTUBE_COOKIES_BASE64" | base64 --decode > cookies.txt
        env:
          YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}

      - name: Debug cookies
        run: |
          echo "=== 檔案是否存在 ==="
          ls -la cookies.txt 2>&1 || echo "NOT FOUND"
          echo "=== 檔案大小 (bytes) ==="
          wc -c < cookies.txt 2>/dev/null || echo "0"
          echo "=== 前 3 行內容 ==="
          head -3 cookies.txt 2>/dev/null || echo "EMPTY"
          echo "=== YOUTUBE_COOKIES_FILE env ==="
          echo "$YOUTUBE_COOKIES_FILE"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/db
            data/analysis
          key: data-cache-${{ github.run_id }}
          restore-keys: data-cache-

      - name: Run daily pipeline
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y-%m-%d)
          fi
          echo "Processing date: $DATE"
          yt-finance-analyzer run --date "$DATE" --verbose
